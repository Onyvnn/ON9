<!DOCTYPE html>
<html>
<head>
  <title>Para ti ❤️</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin-top: 80px;
      font-size: 50px;
      color: pink;
    }

    #mensaje {
      width: 70%;
      margin: auto;
      font-size: 20px;
      margin-top: 20px;
      white-space: pre-line;
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      background: pink;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .corazon {
      position: absolute;
      color: red;
      font-size: 20px;
      animation: caer 5s linear infinite;
    }

    @keyframes caer {
      0% { transform: translateY(-10vh); }
      100% { transform: translateY(100vh); }
    }
  </style>
</head>
<body>

<h1>Para ti ❤️</h1>

<button onclick="mostrarMensaje()">Haz clic aquí 💖</button>
<br>
<button onclick="toggleMusica()">💖 Toca aquí antes de leer</button>

<p id="mensaje"></p>

<audio id="musica" loop>
  <source src="https://cdn.pixabay.com/download/audio/2023/03/14/audio_5f9c6f9c8f.mp3" type="audio/mpeg">
</audio>

<script>
const texto = `Sabes… desde el primer día que nos conocimos más a fondo, sentí una conexión única.
En tus hermosos ojos pude ver tu corazoncito, y desde ese momento no he dejado de pensar en ti.

Cuando te pedí que fueras mi pololita, todo cambió… pero para mejor 💖
Porque ahora puedo imaginar muchas cositas del futuro contigo (todo un pro yo yiaaa 😏).

Todo lo que hemos vivido hasta ahora es único e inigualable para mí.
Y con esto quiero dejar claro que mis intenciones van mucho más allá del tiempo…

Sé que Dios pone tiempos para todo, pero yo, todo chiquitito 🥺, le pido que esto dure hasta el fin del mundo y más allá.

Quiero que nos amemos muchísimo, y desde mi corazón quiero amarte hasta morir…
¿y sabes por qué?
Porque incluso después, mi alma seguiría amándote, y eso nunca se acabaría 💫

Quiero que sepas que cualquier cosita que pase por tu cabecita, cualquier cosa que te haga sentir mal…
puedes contar conmigo siempre, mi amor.
Estoy aquí para ti y para tu corazoncito, siempre ❤️

(Igual tu corazón ya es mío muejeje 😏)

Y lo último…
agarremos nuestras manos y caminemos juntos hasta convertirnos en nube,
para estar tranquilos, juntitos, y felices jijiji ☁️💖

Te amo, corazón.
Nunca supe cómo expresarme bien… pero contigo todo se siente diferente.
Eres alguien muy única para mí, y no cambiaría lo que tenemos por nada 💖`;

let i = 0;

function mostrarMensaje() {
  const contenedor = document.getElementById("mensaje");
  contenedor.innerHTML = "";
  i = 0;

  function escribir() {
    if (i < texto.length) {
      contenedor.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribir, 25);
    }
  }

  escribir();
}

// música
let reproduciendo = false;
function toggleMusica() {
  const audio = document.getElementById("musica");
  if (!reproduciendo) {
    audio.play();
    reproduciendo = true;
  } else {
    audio.pause();
    reproduciendo = false;
  }
}

// corazones
setInterval(() => {
  let corazon = document.createElement("div");
  corazon.innerHTML = "❤️";
  corazon.classList.add("corazon");
  corazon.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(corazon);

  setTimeout(() => {
    corazon.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
